global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "service", "severity"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical
    - matchers:
        - severity="warning"
      receiver: warning

receivers:
  - name: default

  - name: critical

  - name: warning

